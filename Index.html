<form> 
<fieldset> 
<legend>Student Orientation Registration Form</legend> 

<label for="fullname">Full Name:</label> 
<input type="text" id="fullname" name="fullname" placeholder="John Smith" required><br><br>

<label for="matric">Matric No.:</label>
<input type="text" name="matric" id="matric" placeholder="VUG/SEN/24/13132" required><br><br>

<label for="email">Email:</label> 
<input type="email" id="email" name="email" placeholder="sample@gmail.com" required><br><br> 

<label for="age">Age:</label> 
<input type="number" id="age" name="age" placeholder="18" required><br><br> 

<p>Gender:</p> 
<input type="radio" id="male" name="gender" value="Male"> 
<label for="male">Male</label> 
<input type="radio" id="female" name="gender" value="Female"> 
<label for="female">Female</label><br><br> 

<p>Documents Submitted:</p> 
<input type="checkbox" id="admission" name="docs" value="Admission 
Letter"> 
<label for="admission">Admission Letter</label> 
<input type="checkbox" id="receipt" name="docs" value="Payment Receipt"> 
<label for="receipt">Payment Receipt</label> 
<input type="checkbox" name="jambresult" id="jambresult" value="JAMB Result">
<label for="jambresult">JAMB Result</label>
<input type="checkbox" name="medic" id="medic" value="Medical Screening Result">
<label for="medic">Medical Screening Result</label><br><br>

<label for="dob">Date of Birth</label>
<input type="date" name="dob" id="dob" required><br><br>

<label for="passport">Input Passport</label>
<input type="file" name="passport" id="passport">

<label for="faculty">Faculty:</label> 
  <select id="faculty" name="faculty"> 
    <option value="science">Science</option> 
    <option value="arts">Arts</option> 
    <option value="management">Management Sciences</option> 
  </select><br><br> 

<label for="message">Additional Information:</label><br> 

<textarea id="message" name="message" rows="4" cols="40"></textarea><br><br> 
<input type="submit" value="Submit"> 
<input type="reset" value="Reset"> 
</fieldset> 
</form>
